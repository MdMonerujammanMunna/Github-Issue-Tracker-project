<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- google font cnd link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome cnd link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI and Tailwind cnd Link -->
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Git-Hub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="css/style.css">

    <!-- style -->
    <style>
        :root {
            --first-color: #1F2937;
            --second-color: #64748B;
        }
    </style>
</head>

<body class="bg-base-300">
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm flex justify-between">
                <a href="#" class="flex items-center justify-center gap-2">
                    <i class="fa-brands fa-github text-4xl "></i>
                    <h1 class="text-2xl font-semibold text-[var(--first-color)]">GitHub Issues Tracker</h1>
                </a>
                <div class="flex gap-4">
                    <div class="join">
                        <div>
                            <label class="input validator join-item outline-none border-2">
                                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                        stroke="currentColor">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <path d="m21 21-4.3-4.3"></path>
                                    </g>
                                </svg>
                                <input type="search" placeholder="Search issues..." id="Btn-input" />
                            </label>
                        </div>
                        <button class="btn btn-primary shadow-none join-item" id="Btn-search">Search</button>
                    </div>

                    <button class="btn btn-primary shadow-none"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="mx-[50px] md:mx-[100px]  mt-[60px]  ">
        <!-- button section -->
        <section class=" flex gap-4 bg-white p-8 rounded-lg shadow-sm">
            <button onclick="buttonfun('All-button')" id="All-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">All</button>
            <button onclick="buttonfun('Open-button')" id="Open-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">Open</button>
            <button onclick="buttonfun('Closed-button')" id="Closed-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">Closed</button>
        </section>

        <!-- 2nd manu section -->
        <section class="mt-4 flex items-center justify-between bg-white shadow-sm  rounded-lg  p-8">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-[#ECE4FF] rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="">
                    <h1 class="text-xl font-semibold"><span id="count">0</span> Issues</h1>
                    <p class="text-[var(--second-color)]">Track and manage your project issues</p>
                </div>
            </div>

            <!-- round left side -->
            <div class="flex gap-4 items-center">
                <div class="flex gap-1 items-center">
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    <span>Open</span>
                </div>
                <div class="flex gap-1 items-center">
                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                    <span>Closed</span>
                </div>
            </div>
        </section>

        <!-- main card section -->
        <!-- loading section -->
        <section id="Loading-section" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-infinity loading-xl size-30"></span>
        </section>
        <!-- all card -->

        <section id="Card-Container" class="my-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3 ">

        </section>
        <!-- open card -->
        <section id="Open-container" class="my-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3 hidden">
        </section>
        <!-- close card -->
        <section id="Close-container" class="my-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3 hidden">

        </section>


        <!-- Open the modal using ID.showModal() method -->
        <dialog id="modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div class="" id="modal-container">

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary outline-none shadow-none">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
    <script src="javaScript/homeFun.js"></script>
</body>

</html>
