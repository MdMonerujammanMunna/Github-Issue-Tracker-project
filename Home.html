<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- google font cnd link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome cnd link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI and Tailwind cnd Link -->
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Git-Hub-Issu</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="css/style.css">

    <!-- style -->
    <style>
        :root {
            --first-color: #1F2937;
            --second-color: #64748B;
        }
    </style>
</head>

<body class="bg-base-300">
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm flex justify-between">
                <a href="#" class="flex items-center justify-center gap-2">
                    <i class="fa-brands fa-github text-4xl "></i>
                    <h1 class="text-2xl font-semibold text-[var(--first-color)]">GitHub Issues Tracker</h1>
                </a>
                <div class="flex gap-4">
                    <input type="text" placeholder="Search issues..." class="input
                    input-bordered border-2 md:w-auto outline-none" />
                    <button class="btn btn-primary shadow-none"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="mx-[200px] mt-[60px]  ">
        <!-- button section -->
        <section class=" flex gap-4 bg-white p-8 rounded-lg shadow-sm">
            <button onclick="buttonfun('All-button')" id="All-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">All</button>
            <button onclick="buttonfun('Open-button')" id="Open-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">Open</button>
            <button onclick="buttonfun('Closed-button')" id="Closed-button"
                class="btn btn-outline btn-primary px-[40px] py-[12px] shadow-none">Closed</button>
        </section>

        <!-- 2nd manu section -->
        <section class="mt-4 flex items-center justify-between bg-white shadow-sm  rounded-lg  p-8">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-[#ECE4FF] rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="">
                    <h1 class="text-xl font-semibold"><span id="count">0</span> Issues</h1>
                    <p class="text-[var(--second-color)]">Track and manage your project issues</p>
                </div>
            </div>

            <!-- round left side -->
            <div class="flex gap-4 items-center">
                <div class="flex gap-1 items-center">
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    <span>Open</span>
                </div>
                <div class="flex gap-1 items-center">
                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                    <span>Closed</span>
                </div>
            </div>
        </section>

        <!-- main card section -->
        <section id="Card-Container" class="my-6 grid grid-cols-4 gap-3 ">

        </section>
    </main>
    <script src="javaScript/homeFun.js"></script>
</body>

</html>
